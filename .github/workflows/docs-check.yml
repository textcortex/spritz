name: docs-check

on:
  pull_request:
    paths:
      - "docs/**"
      - "README.md"
      - "AGENTS.md"
      - ".github/workflows/docs-check.yml"
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - "README.md"
      - "AGENTS.md"
      - ".github/workflows/docs-check.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Check docs conventions
        run: npx -y @simpledoc/simpledoc check
