global:
  host: spritz.example.com
  ingress:
    className: nginx
    annotations: {}
    tls:
      enabled: true
      secretName: ""
  routing:
    mode: ingress
    gateway:
      name: spritz-shared-host
      namespace: ""
      className: ""
      listenerName: https
      port: 0
  routeModel:
    type: shared-host
    apiPathPrefix: /api
    authPathPrefix: /oauth2
    instancePathPrefix: /i
    chatPathPrefix: /c

acp:
  enabled: true
  port: 2529
  path: /
  healthPath: /healthz
  metadataPath: /.well-known/spritz-acp
  probeTimeout: 3s
  refreshInterval: 30s
  metadataRefreshInterval: 5m
  networkPolicy:
    enabled: false

authGateway:
  enabled: false
  provider: oauth2-proxy
  mode: single-host
  service:
    name: spritz-auth-gateway
    port: 4180
  ingress:
    pathPrefix: /oauth2
    annotations: {}
    authURL: ""
    authSigninURL: ""
    authResponseHeaders:
      - X-Auth-Request-User
      - X-Auth-Request-Email
      - X-Auth-Request-Groups
      - Authorization
    injectIdentityHeaders: true
    headerIdSource: X-Auth-Request-User
    headerEmailSource: X-Auth-Request-Email
    headerTeamsSource: X-Auth-Request-Groups
  oauth2Proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.6.0
    imagePullPolicy: IfNotPresent
    existingSecret: ""
    clientIdKey: OAUTH2_PROXY_CLIENT_ID
    clientSecretKey: OAUTH2_PROXY_CLIENT_SECRET
    cookieSecretKey: OAUTH2_PROXY_COOKIE_SECRET
    oidcIssuerURL: ""
    redirectURL: ""
    scope: "openid email profile"
    emailDomains:
      - "*"
    whitelistDomains: []
    cookieSecure: true
    cookieSameSite: lax
    cookieRefresh: 1h
    cookieExpire: 8h
    setXAuthRequest: true
    passAuthorizationHeader: true
    passAccessToken: true
    skipProviderButton: true
    extraArgs: []
    resources:
      requests:
        cpu: 25m
        memory: 64Mi
      limits:
        cpu: 250m
        memory: 256Mi
    securityContext:
      runAsNonRoot: true
      runAsUser: 65532
      runAsGroup: 65532
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL

operator:
  image: spritz-operator:latest
  imagePullPolicy: IfNotPresent
  rolloutAt: ""
  namespace: spritz-system
  watchNamespaces: []
  serviceAccountName: spritz-operator
  clusterRoleName: spritz-operator
  clusterRoleBindingName: spritz-operator
  ttlGracePeriod: 5m
  workspaceSizeLimit: 10Gi
  homeSizeLimit: 5Gi
  podNodeSelector: ""
  lifecycleNotifications:
    url: ""
    authToken: ""
    timeout: 3s
  sharedMounts:
    enabled: false
    mounts: []
    apiUrl: ""
    tokenSecret:
      name: ""
      key: token
    syncerImage: ""
    syncerImagePullPolicy: ""
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 256Mi
  securityContext:
    runAsNonRoot: true
    runAsUser: 65532
    runAsGroup: 65532
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL

api:
  replicaCount: 1
  image: spritz-api:latest
  imagePullPolicy: IfNotPresent
  rolloutAt: ""
  namespace: spritz-system
  serviceAccountName: spritz-api
  defaultAnnotations: ""
  podAnnotations: {}
  affinity: {}
  topologySpreadConstraints: []
  podDisruptionBudget:
    enabled: false
    minAvailable: 1
  service:
    port: 8080
  auth:
    mode: none
    headerId: X-Spritz-User-Id
    headerEmail: X-Spritz-User-Email
    headerTeams: X-Spritz-User-Teams
    headerType: X-Spritz-Principal-Type
    headerScopes: X-Spritz-Principal-Scopes
    headerTrustTypeAndScopes: false
    headerDefaultType: human
    adminIds: []
    adminTeams: []
    bearer:
      introspectionUrl: ""
      introspectionAuthHeader: ""
      method: GET
      timeout: 5s
      tokenParam: token
      forwardToken: false
      idPaths:
        - sub
      emailPaths:
        - email
      teamsPaths: []
      typePaths: []
      jwks:
        url: ""
        issuer: ""
        audiences: []
        algos:
          - RS256
        leeway: 0s
        refreshInterval: 5m
        refreshTimeout: 5s
        rateLimit: 10s
        fallbackToIntrospection: false
      scopesPaths:
        - scope
        - scopes
        - scp
      defaultType: ""
      staticPrincipalsJson: ""
      staticPrincipalsSecret:
        name: ""
        key: SPRITZ_AUTH_BEARER_STATIC_PRINCIPALS_JSON
  provisioners:
    defaultPresetId: ""
    allowedPresetIds: []
    allowCustomImage: false
    allowCustomRepo: false
    allowNamespaceOverride: false
    allowedNamespaces: []
    defaultIdleTtl: 24h
    maxIdleTtl: 24h
    defaultTtl: 168h
    maxTtl: 168h
    maxActivePerOwner: 0
    maxCreatesPerActor: 0
    maxCreatesPerOwner: 0
    rateWindow: 1h
  cors:
    origins: []
    allowHeaders: Content-Type,Authorization,X-Spritz-User-Id,X-Spritz-User-Email,X-Spritz-User-Teams,X-Spritz-Principal-Type,X-Spritz-Principal-Scopes
    allowMethods: GET,POST,PUT,PATCH,DELETE,OPTIONS
    allowCredentials: true
  defaultIngress:
    mode: ""
    hostTemplate: ""
    path: ""
    className: ""
    gatewayName: ""
    gatewayNamespace: ""
    gatewaySectionName: ""
  instanceProxy:
    enabled: true
    stripPrefix: true
  terminal:
    enabled: true
    container: spritz
    command: "bash -l"
    origins: []
    activityDebounce: 5s
  acp:
    origins: []
  sshGateway:
    enabled: false
    port: 2222
    publicHost: ""
    publicPort: 22
    user: spritz
    principalPrefix: spritz
    certTtl: 15m
    activityRefresh: 1m
    mintLimit: 5
    mintWindow: 1m
    mintBurst: 5
    mintBucketTtl: 30m
    mintBucketCleanup: 5m
    container: spritz
    command: "bash -l"
    secretName: ""
    caKeySecretKey: ca_key
    hostKeySecretKey: host_key
    caKey: ""
    caKeyFile: ""
    hostKey: ""
    hostKeyFile: ""
  sshDefaults:
    enabled: false
    mode: gateway
    gatewayService: spritz-api
    gatewayNamespace: spritz-system
    gatewayPort: 22
    user: spritz
  presets: []
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  securityContext:
    runAsNonRoot: true
    runAsUser: 65532
    runAsGroup: 65532
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
  extraEnv: []
  extraVolumeMounts: []
  extraVolumes: []
  sharedMounts:
    enabled: false
    mounts: []
    prefix: spritz-shared
    rclone:
      remote: ""
      bucket: ""
      configSecret:
        name: ""
        key: rclone.conf
    internalTokenSecret:
      name: ""
      key: token
    maxBundleBytes: ""

ui:
  image: spritz-ui:latest
  imagePullPolicy: IfNotPresent
  rolloutAt: ""
  namespace: spritz-system
  service:
    port: 80
  containerPort: 8080
  ingress:
    enabled: true
  apiBaseUrl: "/api"
  websocketBaseUrl: ""
  ownerId: ""
  assetVersion: ""
  presets: []
  repoDefaults:
    url: ""
    dir: ""
    branch: ""
    hideInputs: false
  launch:
    queryParams: {}
  branding:
    productName: ""
    logoUrl: ""
    faviconUrl: ""
    theme:
      background: ""
      foreground: ""
      muted: ""
      mutedForeground: ""
      primary: ""
      primaryForeground: ""
      border: ""
      destructive: ""
      radius: ""
    terminal:
      background: ""
      foreground: ""
      cursor: ""
  auth:
    mode: none
    tokenStorage: localStorage
    tokenStorageKeys: []
    bearerTokenParam: token
    loginUrl: ""
    returnToMode: auto
    returnToParam: ""
    redirectOnUnauthorized: false
    refresh:
      enabled: false
      url: ""
      method: POST
      credentials: include
      tokenStorageKeys: []
      timeoutMs: 5000
      cooldownMs: 30000
      headers: {}
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 256Mi
  securityContext:
    runAsNonRoot: true
    runAsUser: 101
    runAsGroup: 101
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL

spritz:
  namespace: spritz
