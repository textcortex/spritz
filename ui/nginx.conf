server {
  listen       8080;
  server_name  _;

  root   /usr/share/nginx/html;
  index  index.html;

  location = /index.html {
    add_header Cache-Control "no-store, max-age=0" always;
    try_files $uri =404;
  }

  location = /config.js {
    add_header Cache-Control "no-store, max-age=0" always;
    try_files $uri =404;
  }

  location ~* \.(?:js|css)$ {
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    try_files $uri =404;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
